<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問看護新人教育テスト</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- ログイン画面 -->
        <div id="loginScreen" class="screen active">
            <div class="login-box">
                <h1>訪問看護新人教育テスト</h1>
                <p class="subtitle">2026年度版（無料版）</p>
                
                <form id="loginForm" class="form">
                    <div class="form-group">
                        <label for="username">名前</label>
                        <input type="text" id="username" name="username" required placeholder="山田太郎">
                    </div>
                    
                    <div class="form-group">
                        <label for="facility">施設名</label>
                        <input type="text" id="facility" name="facility" required placeholder="〇〇訪問看護ステーション">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">テスト開始</button>
                </form>
                
                <div class="info-box">
                    <h3>このテストについて</h3>
                    <ul>
                        <li>全4セクション、40問のテスト</li>
                        <li>セクション1：訪問看護の基本と保険制度</li>
                        <li>セクション2：訪問時間・スケジュール管理</li>
                        <li>セクション3：書類記載と日付管理</li>
                        <li>セクション4：観察と報告</li>
                        <li>各問題に詳しい解説があります</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- テスト画面 -->
        <div id="testScreen" class="screen">
            <div class="test-container">
                <!-- ヘッダー -->
                <div class="test-header">
                    <div class="header-left">
                        <h2 id="sectionTitle">セクション1：訪問看護の基本と保険制度</h2>
                        <p id="userInfo" class="user-info">ユーザー: <span id="userName"></span></p>
                    </div>
                    <div class="header-right">
                        <div class="progress">
                            <span id="currentQuestion">1</span> / <span id="totalQuestions">10</span>
                        </div>
                        <button id="exitBtn" class="btn btn-secondary btn-small">終了</button>
                    </div>
                </div>

                <!-- 問題表示エリア -->
                <div id="questionContainer" class="question-container">
                    <div id="questionContent"></div>
                    <div id="optionsContent"></div>
                    <div id="explanationContent" class="explanation hidden"></div>
                </div>

                <!-- ボタン -->
                <div class="button-group">
                    <button id="prevBtn" class="btn btn-secondary">← 前へ</button>
                    <button id="submitBtn" class="btn btn-primary">回答する</button>
                    <button id="nextBtn" class="btn btn-secondary">次へ →</button>
                    <button id="showExplanationBtn" class="btn btn-info">解説を見る</button>
                </div>

                <!-- セクション選択 -->
                <div class="section-selector">
                    <h3>セクション選択</h3>
                    <div class="section-buttons">
                        <button class="section-btn" data-section="section1">セクション1</button>
                        <button class="section-btn" data-section="section2">セクション2</button>
                        <button class="section-btn" data-section="section3">セクション3</button>
                        <button class="section-btn" data-section="section4">セクション4</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="resultScreen" class="screen">
            <div class="result-container">
                <h2>テスト結果</h2>
                <div class="result-summary">
                    <div class="result-score">
                        <p class="score-label">スコア</p>
                        <p class="score-value"><span id="finalScore">0</span>%</p>
                    </div>
                    <div class="result-details">
                        <p>正解数: <span id="correctCount">0</span> / <span id="totalCount">10</span></p>
                        <p id="resultMessage" class="result-message"></p>
                    </div>
                </div>

                <div class="result-breakdown">
                    <h3>セクション別結果</h3>
                    <div id="sectionResults"></div>
                </div>

                <div class="result-answers">
                    <h3>詳細解答</h3>
                    <div id="detailAnswers"></div>
                </div>

                <div class="button-group">
                    <button id="retryBtn" class="btn btn-primary">もう一度やる</button>
                    <button id="homeBtn" class="btn btn-secondary">ホームに戻る</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
