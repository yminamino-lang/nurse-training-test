<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問看護新人教育テスト - ログイン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            margin: 20px;
        }

        .login-container h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
            text-align: center;
        }

        .login-container p {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-top: 20px;
            font-size: 0.85em;
            color: #666;
        }

        .info-box strong {
            color: #667eea;
        }

        .error-message {
            color: #f44336;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            display: none;
            font-size: 0.9em;
        }

        .success-message {
            color: #4caf50;
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 5px;
            display: none;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-container h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>訪問看護新人教育テスト</h1>
        <p>irodori 訪問看護スタッフ用</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">パスワード</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="パスワードを入力してください"
                    required
                >
            </div>

            <button type="submit" class="btn" id="submitBtn">ログイン</button>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div class="info-box">
            <strong>📌 注意：</strong><br>
            irodori-houmonkango.com のメールアドレスを持つスタッフのみ アクセス可能です。<br><br>
            パスワードを忘れた場合は、管理者にお問い合わせください。
        </div>
    </div>

    <script>
        // ========== パスワード設定 ==========
        // 【重要】以下のパスワードを設定してください
        // 管理者（あなた）だけが知っているパスワード
        const CORRECT_PASSWORD = 'irodori2026';  // ← ここを変更

        // ========== ログイン処理 ==========
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            // エラーメッセージをクリア
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // パスワードを確認
            if (password === CORRECT_PASSWORD) {
                // 成功：ローカルストレージにログイン状態を保存
                localStorage.setItem('testAuthToken', 'authenticated');
                localStorage.setItem('loginTime', new Date().toLocaleString('ja-JP'));

                // 成功メッセージを表示
                successMsg.textContent = '✅ ログイン成功！テストサイトに移動します...';
                successMsg.style.display = 'block';

                // 1秒後にテストサイトにリダイレクト
                submitBtn.disabled = true;
                setTimeout(function() {
                    window.location.href = './test.html';
                }, 1000);

            } else {
                // 失敗：エラーメッセージを表示
                errorMsg.textContent = '❌ パスワードが正しくありません。もう一度確認してください。';
                errorMsg.style.display = 'block';

                // パスワード入力欄をクリア
                document.getElementById('password').value = '';
            }
        });

        // ========== ページロード時の確認 ==========
        window.addEventListener('load', function() {
            // 既にログインしている場合は、テストサイトにリダイレクト
            if (localStorage.getItem('testAuthToken') === 'authenticated') {
                // ログイン状態を確認（オプション：セッションタイムアウト設定）
                const loginTime = new Date(localStorage.getItem('loginTime'));
                const currentTime = new Date();
                const diffMinutes = (currentTime - loginTime) / (1000 * 60);

                // 24時間以上経過していればログインセッションをクリア
                if (diffMinutes > 24 * 60) {
                    localStorage.removeItem('testAuthToken');
                    localStorage.removeItem('loginTime');
                } else {
                    // ログイン状態が有効なので、テストサイトにリダイレクト
                    window.location.href = './test.html';
                }
            }
        });
    </script>
</body>
</html>
